# SonarQube Cloud — Automatic Analysis configuration.
#
# IMPORTANT: Automatic Analysis (auto-scan on push, which is how this project is
# scanned — there is no sonar-scanner step in .github/workflows/) IGNORES
# sonar-project.properties. It reads ONLY this .sonarcloud.properties file (plus
# any UI settings). The sonar-scanner CLI reads sonar-project.properties instead,
# so keep the two files in sync.
#   https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis
#
# NOTE: Automatic Analysis reads this file from the repository DEFAULT BRANCH.
# It must be present on master for the exclusion below to apply to feature-branch
# / PR analyses.

# Analysis scope — src + scripts are production code; tests are test sources.
sonar.sources=src,scripts
sonar.tests=tests

# Copy-paste detection (CPD)
#   Test fixtures and scenario tests are intentionally explicit and self-contained
#   — each regulatory scenario carries its own hand-calc data and pipeline setup,
#   so per-scenario repetition is by-design (not a defect). Excluding tests from
#   duplication detection (only; analysis/coverage are unaffected) is what clears
#   the "Duplication on New Code" quality gate.
sonar.cpd.exclusions=tests/**

# NOTE: the per-rule test suppressions (S101 / S125 / pythonbugs:S2259 / S1244)
# configured in sonar-project.properties are NOT among the properties supported in
# .sonarcloud.properties under Automatic Analysis. If those test-only findings
# regress, configure them under Project > Administration > General Settings >
# Analysis Scope in the SonarQube Cloud UI.
