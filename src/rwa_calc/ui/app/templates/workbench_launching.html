{% extends "base.html" %}
{% block title %}Starting workbench…{% endblock %}

{% block content %}
<h1>Starting the workbench…</h1>
<p class="lede muted">The Marimo editor is starting on port {{ edit_port }}. You'll be redirected in a
moment — if not, open it directly:</p>
<p><a class="btn btn-primary" href="//localhost:{{ edit_port }}/">Open the workbench editor</a></p>
<script>
  setTimeout(function () {
    window.location.href = "//localhost:{{ edit_port }}/";
  }, 3000);
</script>
{% endblock %}
